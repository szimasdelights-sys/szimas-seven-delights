<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family: Arial; padding:20px; background:#f4efe6; }
table { width:100%; background:white; border-collapse: collapse; }
th,td { padding:10px; border:1px solid #ccc; text-align:center; }
</style>
</head>
<body>

<h1>Orders Dashboard</h1>
<h2 id="totalSales">Total: $0</h2>

<table>
<thead>
<tr>
<th>Name</th><th>Email</th><th>Items</th><th>Total</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>

<script>
const SHEET_ID = "1yDADA6-M5sVpagaBh5JGGxAIEr7d8063c3e-QQzbVqE";

async function loadOrders(){
  const url = `https://docs.google.com/spreadsheets/d/${1yDADA6-M5sVpagaBh5JGGxAIEr7d8063c3e-QQzbVqE}/gviz/tq?tqx=out:json`;
  
  const res = await fetch(url);
  const text = await res.text();

  const json = JSON.parse(text.substring(47).slice(0, -2));
  const rows = json.table.rows;

  const table = document.getElementById('orders');
  table.innerHTML = '';

  rows.forEach(r => {
    const row = document.createElement('tr');

    const name = r.c[0]?.v || '';
    const email = r.c[1]?.v || '';
    const items = r.c[2]?.v || '';
    const total = r.c[3]?.v || '';

    row.innerHTML = `
      <td>${name}</td>
      <td>${email}</td>
      <td>${items}</td>
      <td>$${total}</td>
      <td>Auto</td>
      <td>Pending</td>
      <td>View in Sheet</td>
    `;

    table.appendChild(row);
  });
}

loadOrders();
</script>

</body>
</html>
