<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>
<style>
body { font-family: Arial; padding:20px; background:#f4efe6; }
table { width:100%; background:white; border-collapse: collapse; }
th,td { padding:10px; border:1px solid #ccc; text-align:center; }
</style>
</head>
<body>

<h1>Orders Dashboard</h1>
<h2 id="totalSales">Total: $0</h2>

<table>
<thead>
<tr>
<th>Name</th><th>Email</th><th>Items</th><th>Total</th>
</tr>
</thead>
<tbody id="orders"></tbody>
</table>

<script>
const SHEET_ID = "PASTE_YOUR_SHEET_ID";

function parseGoogleJSON(text){
  try {
    const start = text.indexOf('{');
    const end = text.lastIndexOf('}');
    const jsonString = text.substring(start, end + 1);
    return JSON.parse(jsonString);
  } catch (e) {
    console.error("Parsing error:", e);
    alert("Error loading orders. Check your Sheet permissions.");
    return null;
  }
}

async function load(){
  try {
    const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`);
    const text = await res.text();

    const json = parseGoogleJSON(text);
    if(!json) return;

    let total=0;
    const rows=json.table.rows;
    const table=document.getElementById('orders');
    table.innerHTML = '';

    rows.forEach(r=>{
      const name=r.c[1]?.v||'';
      const email=r.c[2]?.v||'';
      const items=r.c[3]?.v||'';
      const t=parseFloat(r.c[4]?.v||0);

      total+=t;

      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${name}</td><td>${email}</td><td>${items}</td><td>$${t}</td>`;
      table.appendChild(tr);
    });

    document.getElementById('totalSales').innerText="Total: $"+total.toFixed(2);

  } catch(err) {
    console.error(err);
    alert("Failed to load dashboard data.");
  }
}

load();
</script>

</body>
</html>
